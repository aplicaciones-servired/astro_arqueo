version: "3.8"

services:
  # --- Backend API principal
  arqueo-server-1:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: arqueo-server-1
    image: arqueo-server
    networks:
      - red-gane-int
    env_file:
      - ./server/.env

  # --- Frontend Astro SSR (Node)
  web_arqueo:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: web_arqueo
    image: web-arqueo
    expose:
      - "4321"
    depends_on:
      - arqueo-server-1
    networks:
      - red-gane-int
    env_file:
      - ./client/.env
    # Opcional: montar el .env como volumen en desarrollo
    volumes:
      - ./client/.env:/app/.env:ro

  # --- Reverse Proxy Nginx
  proxy_arqueo:
    image: nginx:alpine
    container_name: proxy_arqueo
    depends_on:
      - web_arqueo
      - arqueo-server-1
    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    networks:
      - red-gane-int
    environment:
    - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}

networks:
  red-gane-int:
    external: true